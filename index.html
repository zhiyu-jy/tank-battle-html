<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>坦克大战</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="header">
        <div>
          <p class="eyebrow">HTML Canvas Game</p>
          <h1>坦克大战</h1>
        </div>
        <div class="hud">
          <div class="hud-item">生命：<span id="lives">3</span></div>
          <div class="hud-item">敌人：<span id="enemies">4</span></div>
          <div class="hud-item">得分：<span id="score">0</span></div>
          <div class="hud-item">状态：<span id="status">战斗中</span></div>
        </div>
        <p class="tips">WASD / 方向键移动，空格发射。摧毁所有敌方坦克即可获胜。</p>
      </header>

      <section class="stage">
        <canvas id="game" width="800" height="600" aria-label="坦克大战游戏画布"></canvas>
        <div id="overlay" class="overlay" aria-live="polite">
          <div class="overlay-card">
            <h2 id="overlay-title">游戏结束</h2>
            <p id="overlay-text">点击按钮重新开始。</p>
            <button id="restart-btn" type="button">重新开始</button>
          </div>
        </div>
      </section>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
